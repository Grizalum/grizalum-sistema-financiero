<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIZALUM | Nueva contraseña</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f1923 0%, #1a2e1a 50%, #0f1923 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(15, 30, 25, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 20px;
      padding: 36px 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo-img {
      width: 150px; height: 150px;
      margin: 0 auto 14px;
      background: #fff;
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    }
    .logo-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .marca-sub { text-align: center; color: #d4af37; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 26px; }
    h1 {
      text-align: center;
      font-size: 26px; font-weight: 800;
      color: #d4af37;
      letter-spacing: 1px;
    }
    .sub { text-align: center; color: #9aa6a0; font-size: 13px; margin-bottom: 26px; }
    .titulo { text-align: center; font-size: 17px; font-weight: 600; margin-bottom: 20px; color: #e8e8e8; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px 2px; color: #cfd8d3; }
    .campo {
      width: 100%;
      padding: 13px 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }
    .campo:focus { outline: none; border-color: #d4af37; }
    .campo::placeholder { color: #7c8a83; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #d4af37, #c9a227);
      color: #1a1a1a;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .msg { text-align: center; font-size: 13px; margin-top: 16px; min-height: 18px; }
    .msg.error { color: #ff8a8a; }
    .msg.ok { color: #7ee0a0; }
    .volver { display: block; text-align: center; margin-top: 18px; color: #9aa6a0; font-size: 13px; text-decoration: none; }
    .volver:hover { color: #d4af37; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-img"><img src="/src/assets/grizalum-logo.png" alt="GRIZALUM"></div>
    <p class="marca-sub">Control Financiero Empresarial</p>

    <p class="titulo">Crear nueva contraseña</p>

    <label for="nuevaPass">Nueva contraseña</label>
    <input type="password" id="nuevaPass" class="campo" placeholder="Mínimo 6 caracteres">

    <label for="confirmarPass">Confirmar contraseña</label>
    <input type="password" id="confirmarPass" class="campo" placeholder="Repite la contraseña">

    <button class="btn" id="btnCambiar">Cambiar contraseña</button>

    <p class="msg" id="msg"></p>

    <a class="volver" href="/src/vistas/auth/login.html">← Volver al login</a>
  </div>

  <script>
    // Cliente de Supabase (el mismo proyecto que el resto de la app)
    const db = window.supabase.createClient(
      'https://qchzawosebbsyitgghtb.supabase.co',
      'sb_publishable_Uo-6mOdIKmS3BZ0lghZNqw_iH1P3WF9'
    );

    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnCambiar');

    function mostrar(texto, tipo) {
      msg.textContent = texto;
      msg.className = 'msg ' + tipo;
    }

    async function cambiarContrasena() {
      const pass  = document.getElementById('nuevaPass').value;
      const pass2 = document.getElementById('confirmarPass').value;

      // Validaciones simples antes de mandar nada
      if (pass.length < 6) {
        mostrar('La contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }
      if (pass !== pass2) {
        mostrar('Las contraseñas no coinciden.', 'error');
        return;
      }

      btn.disabled = true;
      mostrar('Guardando...', 'ok');

      // Supabase ya reconoció el enlace del correo al cargar la página,
      // así que aquí solo actualizamos la contraseña del usuario.
      const { error } = await db.auth.updateUser({ password: pass });

      if (error) {
        btn.disabled = false;
        mostrar('No se pudo cambiar. El enlace pudo haber expirado; pide uno nuevo desde el login.', 'error');
        return;
      }

      mostrar('¡Listo! Contraseña cambiada. Entrando...', 'ok');
      setTimeout(function () { window.location.replace('/'); }, 2000);
    }

    btn.addEventListener('click', cambiarContrasena);
  </script>
</body>
</html>

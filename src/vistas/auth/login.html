<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRIZALUM | Iniciar Sesión</title>
    <!-- ════ Si YA tiene sesión, al dashboard ════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.grizalumDB = window.supabase.createClient(
    'https://qchzawosebbsyitgghtb.supabase.co',
    'sb_publishable_Uo-6mOdIKmS3BZ0lghZNqw_iH1P3WF9'
  );
  window.grizalumDB.auth.getSession().then(function (res) {
    if (res.data.session) {
      window.location.replace('/');
    }
  });
</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1923 0%, #1a2e1a 50%, #0f1923 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 420px; }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .logo-img {
            width: 150px; height: 150px;
            margin: 0 auto 14px auto;
            background: #fff;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.35);
        }
        .login-logo .logo-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .login-logo .marca-sub {
            color: #d4af37; font-size: 12px; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 32px;
            backdrop-filter: blur(20px);
        }
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 10px; padding: 4px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1; padding: 10px; text-align: center;
            border: none; background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 14px; font-weight: 600;
            cursor: pointer; border-radius: 8px;
            transition: all 0.3s; font-family: 'Inter', sans-serif;
        }
        .tab.active {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: #000;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7);
            font-size: 13px; font-weight: 600; margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: white;
            font-size: 14px; font-family: 'Inter', sans-serif;
            transition: all 0.3s; outline: none;
        }
        .form-group input:focus {
            border-color: #d4af37;
            background: rgba(212,175,55,0.08);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            border: none; border-radius: 10px;
            color: #000; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: all 0.3s; font-family: 'Inter', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,175,55,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .mensaje {
            padding: 12px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            margin-top: 16px; display: none;
        }
        .mensaje.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .mensaje.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-logo">
        <div class="logo-img"><img src="/src/assets/grizalum-logo.png" alt="GRIZALUM"></div>
        <p class="marca-sub">Control Financiero Empresarial</p>
    </div>

    <div class="login-card">
        <div class="tabs">
            <button class="tab active" id="tab-login">Iniciar Sesión</button>
            <button class="tab" id="tab-registro">Registrarse</button>
        </div>

        <!-- LOGIN -->
        <div id="panel-login" class="form-panel active">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="login-email" placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div style="text-align: right; margin: -6px 0 16px 0;">
                <a href="#" id="link-recuperar" style="color: rgba(212,175,55,0.85); font-size: 13px; text-decoration: none;">¿Olvidaste tu contraseña?</a>
            </div>
            <button class="btn-primary" id="btn-login">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
            <div id="login-mensaje" class="mensaje"></div>
        </div>

        <!-- REGISTRO -->
        <div id="panel-registro" class="form-panel">
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="reg-nombre" placeholder="Escribe tu nombre completo">
            </div>
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="reg-email" placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres">
            </div>
            <button class="btn-primary" id="btn-registro">
                <i class="fas fa-user-plus"></i> Crear cuenta
            </button>
            <div id="reg-mensaje" class="mensaje"></div>
        </div>
    </div>
</div>

<script>
(async () => {
    // Cargar Supabase dinámicamente
    await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });

    const { createClient } = window.supabase;
    const db = createClient(
        'https://qchzawosebbsyitgghtb.supabase.co',
        'sb_publishable_Uo-6mOdIKmS3BZ0lghZNqw_iH1P3WF9'
    );

    function mostrarMensaje(id, texto, tipo) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = 'mensaje ' + tipo;
        el.style.display = 'block';
    }

    // Tabs
    document.getElementById('tab-login').addEventListener('click', function() {
        document.getElementById('tab-login').classList.add('active');
        document.getElementById('tab-registro').classList.remove('active');
        document.getElementById('panel-login').classList.add('active');
        document.getElementById('panel-registro').classList.remove('active');
    });

    document.getElementById('tab-registro').addEventListener('click', function() {
        document.getElementById('tab-registro').classList.add('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('panel-registro').classList.add('active');
        document.getElementById('panel-login').classList.remove('active');
    });

    // Login
    document.getElementById('btn-login').addEventListener('click', async function() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
            mostrarMensaje('login-mensaje', '⚠️ Completa todos los campos', 'error');
            return;
        }

        this.disabled = true;
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

        const { data, error } = await db.auth.signInWithPassword({ email, password });

        if (error) {
            mostrarMensaje('login-mensaje', '❌ Correo o contraseña incorrectos', 'error');
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        } else {
            mostrarMensaje('login-mensaje', '✅ Bienvenido! Redirigiendo...', 'success');
            setTimeout(() => { window.location.href = '/'; }, 1500);
        }
    });
    // Recuperar contraseña
    document.getElementById('link-recuperar').addEventListener('click', async function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        if (!email) {
            mostrarMensaje('login-mensaje', '⚠️ Escribe tu correo arriba y vuelve a tocar el enlace', 'error');
            return;
        }
        const { error } = await db.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://grizalum-sistema-financiero.vercel.app/src/vistas/auth/reset.html'
        });
        if (error) {
            mostrarMensaje('login-mensaje', '❌ No se pudo enviar. Intenta de nuevo en un rato.', 'error');
        } else {
            mostrarMensaje('login-mensaje', '📩 Te enviamos un correo para restablecer tu contraseña. Revísalo (y mira también en spam).', 'success');
        }
    });
    
    // Registro
    document.getElementById('btn-registro').addEventListener('click', async function() {
        const nombre = document.getElementById('reg-nombre').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;

        if (!nombre || !email || !password) {
            mostrarMensaje('reg-mensaje', '⚠️ Completa todos los campos', 'error');
            return;
        }

        if (password.length < 8) {
            mostrarMensaje('reg-mensaje', '⚠️ La contraseña debe tener mínimo 8 caracteres', 'error');
            return;
        }

     this.disabled = true;
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';

        const { data, error } = await db.auth.signUp({
            email,
            password,
            options: { data: { nombre } }
        });

        if (error) {
            let mensajeError = '❌ ' + error.message;
            if (error.message.includes('already registered') || 
                error.message.includes('already been registered') ||
                error.message.includes('User already registered')) {
                mensajeError = '❌ Este correo ya tiene una cuenta. Inicia sesión.';
            }
            mostrarMensaje('reg-mensaje', mensajeError, 'error');
        } else {
            mostrarMensaje('reg-mensaje', '✅ Cuenta creada. Revisa tu correo para confirmar.', 'success');
        }

        this.disabled = false;
        this.innerHTML = '<i class="fas fa-user-plus"></i> Crear cuenta';
    });
})();
</script>
</body>
</html>

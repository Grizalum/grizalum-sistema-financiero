<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIZALUM | Acceso</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f1923 0%, #1a2e1a 50%, #0f1923 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #fff;
    }
    .card {
      width: 100%; max-width: 440px;
      background: rgba(15, 30, 25, 0.55);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .logo-img {
      width: 190px; height: 190px;
      margin: 0 auto 16px;
      background: #fff;
      border-radius: 26px;
      padding: 14px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.38);
    }
    .logo-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .marca-sub {
      color: #d4af37; font-size: 12px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px;
    }
    .titulo { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .texto { color: #9aa6a0; font-size: 14px; line-height: 1.6; margin-bottom: 26px; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #d4af37, #c9a227);
      color: #1a1a1a; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif; margin-bottom: 8px;
    }
    .btn:hover { filter: brightness(1.05); }
    .enlaces { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
    .enlace { color: #9aa6a0; font-size: 13px; text-decoration: none; cursor: pointer; }
    .enlace:hover { color: #d4af37; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-img"><img src="/src/assets/grizalum-logo.png" alt="GRIZALUM"></div>
    <p class="marca-sub">Control Financiero Empresarial</p>

    <div id="contenido"></div>

    <button class="btn" id="btn-suscribir">Suscribirme</button>

    <div class="enlaces">
      <a class="enlace" href="/">Volver a intentar</a>
      <a class="enlace" id="salir">Cerrar sesión</a>
    </div>
  </div>

  <script>
    const db = window.supabase.createClient(
      'https://qchzawosebbsyitgghtb.supabase.co',
      'sb_publishable_Uo-6mOdIKmS3BZ0lghZNqw_iH1P3WF9'
    );

    const razon = new URLSearchParams(location.search).get('razon');
    const cont = document.getElementById('contenido');
    const btn = document.getElementById('btn-suscribir');

    if (razon === 'suspendido') {
      cont.innerHTML =
        '<p class="titulo">Tu cuenta está suspendida</p>' +
        '<p class="texto">Tu acceso fue pausado por el administrador. Escríbenos para reactivarla.</p>';
      btn.style.display = 'none';
    } else {
      cont.innerHTML =
        '<p class="titulo">Tu prueba gratuita terminó</p>' +
        '<p class="texto">Suscríbete para seguir usando GRIZALUM con todas tus empresas y tu información.</p>';
    }

    btn.addEventListener('click', function () {
      alert('La suscripción estará disponible muy pronto (estamos conectando los pagos). Por ahora, escríbenos para activarte.');
    });

    document.getElementById('salir').addEventListener('click', async function () {
      await db.auth.signOut();
      window.location.replace('/src/vistas/auth/login.html');
    });
  </script>
</body>
</html>
